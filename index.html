<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PRODIGY Task-02 Stopwatch - Ayush Singh</title>

<style>
    body {
        margin: 0;
        padding: 0;
        font-family: Arial, sans-serif;
        background: linear-gradient(135deg, #141e30, #243b55);
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        color: black;
    }

    .container {
        width: 350px;
        text-align: center;
        background: rgba(255, 255, 255, 0.1);
        padding: 30px;
        border-radius: 20px;
        box-shadow: 0 0 20px rgba(0,0,0,0.5);
    }

    h1 {
        margin-bottom: 10px;
    }

    .creator {
        color: #dcdcdc;
        margin-bottom: 20px;
        font-size: 14px;
    }

    #display {
        font-size: 50px;
        font-weight: bold;
        margin: 25px 0;
    }

    .buttons button {
        padding: 10px 15px;
        margin: 5px;
        border: none;
        border-radius: 10px;
        font-size: 16px;
        cursor: pointer;
    }

    .buttons button:hover {
        opacity: 0.8;
    }

    #laps {
        list-style: none;
        padding: 0;
        margin-top: 20px;
        max-height: 200px;
        overflow-y: auto;
    }

    #laps li {
        background: rgba(255,255,255,0.1);
        padding: 10px;
        margin: 8px 0;
        border-radius: 8px;
    }

    footer {
        margin-top: 20px;
        color: #dcdcdc;
        font-size: 13px;
    }
</style>
</head>

<body>

<div class="container">

    <h1>⏱ Stopwatch</h1>

    <div class="creator">
        Created by <strong>Ayush Singh</strong>
    </div>

    <div id="display">00:00:00</div>

    <div class="buttons">
        <button onclick="startTimer()">Start</button>
        <button onclick="pauseTimer()">Pause</button>
        <button onclick="resetTimer()">Reset</button>
        <button onclick="lapTime()">Lap</button>
    </div>

    <ul id="laps"></ul>

    <footer>
        PRODIGY INFOTECH - Task 02
    </footer>

</div>

<script>
    let seconds = 0;
    let minutes = 0;
    let hours = 0;
    let timer = null;

    function stopwatch() {
        seconds++;

        if (seconds === 60) {
            seconds = 0;
            minutes++;
        }

        if (minutes === 60) {
            minutes = 0;
            hours++;
        }

        let h = hours < 10 ? "0" + hours : hours;
        let m = minutes < 10 ? "0" + minutes : minutes;
        let s = seconds < 10 ? "0" + seconds : seconds;

        document.getElementById("display").innerText =
            h + ":" + m + ":" + s;
    }

    function startTimer() {
        if (timer !== null) {
            clearInterval(timer);
        }

        timer = setInterval(stopwatch, 1000);
    }

    function pauseTimer() {
        clearInterval(timer);
    }

    function resetTimer() {
        clearInterval(timer);

        seconds = 0;
        minutes = 0;
        hours = 0;

        document.getElementById("display").innerText = "00:00:00";
        document.getElementById("laps").innerHTML = "";
    }

    function lapTime() {
        const lap = document.createElement("li");
        lap.innerText = "Lap: " +
            document.getElementById("display").innerText;

        document.getElementById("laps").appendChild(lap);
    }
</script>

</body>
</html>
